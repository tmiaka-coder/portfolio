<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | Miaka</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <a href="#main-content" class="skip-link">メインコンテンツへスキップ</a>

    <header class="site-header">
        <div class="container header-container">
            <div class="logo"><a href="index.html">Miaka</a></div>
            <nav class="main-nav" aria-label="メインナビゲーション">
                <ul class="nav-links">
                    <li><a href="index.html">ホーム</a></li>
                    <li><a href="works.html">実績</a></li>
                    <li><a href="services.html">サービス</a></li>
                    <li><a href="about.html">プロフィール</a></li>
                    <li><a href="contact.html" class="active">お問い合わせ</a></li>
                </ul>
            </nav>
            <div class="lang-switch">
                <a href="../contact.html" class="lang-btn">EN</a>
                <span class="separator">|</span>
                <a href="contact.html" class="lang-btn active">JP</a>
            </div> 
        </div>
    </header>
    
    <main id="main-content">
        <!-- Page Header -->
        <section class="container" style="padding: 80px 20px 40px;">
            <span class="section-label">Connect</span>
            <h1 class="hero-title" style="font-size: clamp(2.5rem, 8vw, 4rem);">Let's Start <br>a Conversation.</h1>
            <p style="color: var(--color-gray-text); max-width: 600px;">制作のご相談、お見積もりなどお気軽にご相談ください。</p>
        </section>
        <section class="contact-section">
            <p class="contact-instruction">ご都合の良い方法でご連絡ください。</p>
            
            <div class="contact-grid">
                <!-- 方法1: Googleフォーム -->
                <div class="contact-card">
                    <h3>Contact Form</h3>
                    <div class="contact-icon-wrapper">
                        <svg class="contact-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                    </div>
                    <p class="contact-note">ブラウザから直接入力できます。</p>
                    <a href="https://docs.google.com/forms/d/e/1FAIpQLScuIXzlD4olGdR9VJLzK9lZD-yv8p9sdp6qLUdCYa3e2zy3xw/viewform?usp=publish-editor" 
                       class="contact-btn" 
                       target="_blank" 
                       rel="noopener noreferrer">
                        フォームを開く
                    </a>
                </div>
    
                <!-- 方法2: 直接メール -->
                <div class="contact-card">
                    <h3>Direct Email</h3>
                    <div class="contact-icon-wrapper">
                        <!-- 閉じた封筒 -->
                        <svg class="contact-svg svg-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <!-- 開いた封筒 -->
                        <svg class="contact-svg svg-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,18 12,11 2,18"></polyline>
                            <path d="M2 6l10 7 10-7"></path>
                        </svg>
                    </div>
                    <p class="contact-note">お使いのメールアプリが起動します。</p>
                    <a href="mailto:t.miaka1023@gmail.com?subject=お問い合わせ" class="contact-btn">
                        メールを送る
                    </a>
                </div>
            </div>
        </section>
    </main>
    
    <footer class="site-footer">
        <div class="container footer-container">
            <p class="copyright">&copy; 2026 Miaka. Designed with Heart & Accessibility.</p>
        </div>
    </footer>    
</body>
</html>
