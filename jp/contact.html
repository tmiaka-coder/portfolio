<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | AI駆動開発者 & UXアドボケイト</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <a href="#main-content" class="skip-link">メインコンテンツへスキップ</a>

    <header class="site-header">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html">NAME<span>.</span></a>
            </div>
            <nav class="main-nav" aria-label="メインナビゲーション">
                <ul class="nav-links">
                    <li><a href="index.html">ホーム</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="projects.html">プロジェクト</a></li>
                    <li><a href="cv.html">履歴書</a></li>
                    <li><a href="contact.html" class="active">お問い合わせ</a></li>
                </ul>
            </nav>
            <div class="lang-switch">
                <a href="../contact.html" class="lang-btn">EN</a>
                <span class="separator">|</span>
                <a href="contact.html" class="lang-btn active">JP</a>
            </div>
        </div>
    </header>

    <main id="main-content">
        <section class="page-header">
            <div class="container">
                <h1 class="hero-title">お問い合わせ</h1>
                <p class="hero-description">プロジェクトの相談や採用に関するお問い合わせなど、お気軽にご連絡ください。</p>
            </div>
        </section>

        <section class="contact-section">
            <div class="container grid-2">
                <div class="contact-info">
                    <p class="hero-label">連絡先</p>
                    <h2 class="section-subtitle">つながりましょう。</h2>
                    <p>現在ニュージーランドを拠点に活動しており、新しい機会やコラボレーションをお待ちしております。</p>
                    
                    <div class="contact-method">
                        <h3>メール</h3>
                        <p><a href="mailto:your.email@example.com">your.email@example.com</a></p>
                    </div>
                    <div class="contact-method">
                        <h3>SNS</h3>
                        <p><a href="#">LinkedIn</a> / <a href="#">GitHub</a></p>
                    </div>
                </div>

                <div class="contact-form-container">
                    <form action="#" method="POST" class="contact-form">
                        <div class="form-group">
                            <label for="name">お名前</label>
                            <input type="text" id="name" name="name" required placeholder="山田 太郎">
                        </div>
                        <div class="form-group">
                            <label for="email">メールアドレス</label>
                            <input type="email" id="email" name="email" required placeholder="name@example.com">
                        </div>
                        <div class="form-group">
                            <label for="subject">件名</label>
                            <input type="text" id="subject" name="subject" required placeholder="プロジェクトのご相談">
                        </div>
                        <div class="form-group">
                            <label for="message">メッセージ</label>
                            <textarea id="message" name="message" rows="5" required placeholder="メッセージをご入力ください..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">送信する</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-container">
            <p class="copyright">&copy; 2024 Your Name. All rights reserved.</p>
        </div>
    </footer>

    <style>
        .contact-section { padding: 60px 0; }
        .contact-method { margin-top: 2rem; }
        .contact-method h3 { font-size: 0.9rem; text-transform: uppercase; color: var(--color-silver); margin-bottom: 0.5rem; }
        .contact-method a { color: var(--color-black); text-decoration: none; border-bottom: 1px solid var(--color-silver); }

        .contact-form { display: grid; gap: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.9rem; font-weight: 600; }
        .form-group input, .form-group textarea {
            padding: 12px;
            border: 1px solid var(--color-silver);
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: 2px solid var(--color-black);
            border-color: var(--color-black);
        }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; gap: 3rem; }
        }
    </style>
</body>
</html>
