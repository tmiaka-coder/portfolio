<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>実績 | Miaka</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <a href="#main-content" class="skip-link">メインコンテンツへスキップ</a>

    <header class="site-header">
        <div class="container header-container">
            <div class="logo"><a href="../index.html">Miaka</a></div>
            <nav class="main-nav" aria-label="メインナビゲーション">
                <ul class="nav-links">
                    <li><a href="../jp/index.html">ホーム</a></li>
                    <li><a href="../jp/works.html" class="active">実績</a></li>
                    <li><a href="../jp/services.html">サービス</a></li>
                    <li><a href="../jp/about.html">プロフィール</a></li>
                    <li><a href="../jp/contact.html">お問い合わせ</a></li>
                </ul>
            </nav>
            <div class="lang-switch">
                <a href="../works.html" class="lang-btn">EN</a>
                <span class="separator">|</span>
                <a href="../jp/works.html" class="lang-btn active">JP</a>
            </div>
        </div>
    </header>

    <main id="main-content">
        <!-- Page Header -->
        <section class="container" style="padding: 80px 20px 40px;">
            <span class="section-label">Archive</span>
            <h1 class="hero-title" style="font-size: clamp(2.5rem, 8vw, 4rem);">Selected <br>Works.</h1>
            <p style="color: var(--color-gray-text); max-width: 600px;">テスターとして培った品質へのこだわりと、誰もが使いやすいインクルーシブなデザインを意識しました。</p>
        </section>

        <!-- Filter Buttons -->
        <nav class="container" style="padding-bottom: 40px;" aria-label="作品カテゴリフィルタ">
            <div class="filter-buttons" role="group" aria-label="カテゴリで絞り込み">
                <button type="button" class="filter-btn active" data-category="all" aria-pressed="true">All</button>
                <button type="button" class="filter-btn" data-category="app" aria-pressed="false">App</button>
                <button type="button" class="filter-btn" data-category="banner" aria-pressed="false">Banner</button>
                <button type="button" class="filter-btn" data-category="movie" aria-pressed="false">Movie</button>
            </div>
        </nav>

        <!-- Works Grid -->
        <section class="container" style="padding-bottom: 100px;">
            <div id="works-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Works will be dynamically inserted here by JavaScript -->
            </div>
            <p id="no-results" class="text-center text-gray-500 py-12" style="display: none;">該当する作品がありません</p>
        </section>

        <!-- CTA Section -->
        <section style="background: var(--color-accent); color: #fff; padding: 100px 0; text-align: center;">
            <div class="container">
                <h2 style="font-size: 2rem; margin-bottom: 20px;">Let's build something honest.</h2>
                <p style="opacity: 0.8; margin-bottom: 40px;">法的遵守とアクセシビリティを、一過性のトレンドではなく「基盤」に。</p>
                <a href="../jp/contact.html" class="cta-button">お問い合わせ</a>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p class="copyright">&copy; 2026 Miaka. Designed with Heart & Accessibility.</p>
        </div>
    </footer>

    <script>
        /**
         * 作品データ配列
         * 新しい作品を追加するには、この配列にオブジェクトを追加してください。
         * 必須フィールド: id, category, title, description, image, link
         * category: 'app' | 'banner' | 'movie' のいずれかを指定
         */
        const worksData = [
            {
                id: 1,
                category: 'app',
                categoryLabel: 'WEB APPLICATION',
                title: 'Kiwi Talkboard',
                description: 'ニュージランド移住者と現地をつなぐ安全でアクセシブルな掲示板アプリ',
                image: '../assets/images/appKIWI.jpg',
                imageAlt: 'Kiwi Talkboard アプリのプレビュー',
                link: 'works/app/app-kiwitalkboard.html'
            },
            {
                id: 2,
                category: 'banner',
                categoryLabel: 'ADVERTISEMENT',
                title: 'パン屋さん広告',
                description: 'ターゲット層に響くビジュアル戦略。',
                image: '../assets/images/banner-salt-pan.jpg',
                imageAlt: 'パン屋さん広告のプレビュー',
                link: 'works/banner/banner-bread.html'
            },
            {
                id: 3,
                category: 'movie',
                categoryLabel: 'SHORT FORM',
                title: '焼き鳥屋ショート動画',
                description: 'SNS向け短尺動画制作。',
                image: '../assets/images/shotyakitori.png',
                imageAlt: '焼き鳥屋ショート動画サムネイル',
                link: 'works/movie/movie-showcase.html'
            }
            // 新しい作品を追加する場合：
            // {
            //     id: 4,
            //     category: 'lp',
            //     categoryLabel: 'LANDING PAGE',
            //     title: '新しい作品タイトル',
            //     description: '作品の説明文',
            //     image: '画像パス',
            //     imageAlt: '画像の説明',
            //     link: '詳細ページへのパス'
            // }
        ];

        /**
         * カテゴリ定義
         * 新しいカテゴリを追加する場合、このオブジェクトにエントリを追加してください
         */
        const categories = {
            all: { label: 'All', ariaLabel: 'すべての作品' },
            app: { label: 'App', ariaLabel: 'アプリ開発の作品' },
            banner: { label: 'Banner', ariaLabel: 'バナー制作の作品' },
            movie: { label: 'Movie', ariaLabel: '動画編集の作品' }
        };

        /**
         * 作品カードを生成する関数
         * @param {Object} work - 作品データオブジェクト
         * @returns {string} - HTML文字列
         */
        function createWorkCard(work) {
            return `
                <article class="work-item group">
                    <a href="${work.link}" class="block">
                        <div class="work-thumb aspect-video bg-gray-100 rounded overflow-hidden">
                            <img src="${work.image}" alt="${work.imageAlt}" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105">
                        </div>
                        <div class="mt-4">
                            <span class="section-label text-[0.6rem] tracking-widest mb-2 block">${work.categoryLabel}</span>
                            <h2 class="work-title text-xl font-semibold">${work.title}</h2>
                            <p class="text-sm text-gray-600 mt-2 leading-relaxed">${work.description}</p>
                        </div>
                    </a>
                </article>
            `;
        }

        /**
         * 作品をフィルタリングして表示する関数
         * @param {string} category - フィルタリングするカテゴリ（'all'で全件表示）
         */
        function filterWorks(category) {
            const grid = document.getElementById('works-grid');
            const noResults = document.getElementById('no-results');
            
            // フィルタリング
            const filteredWorks = category === 'all' 
                ? worksData 
                : worksData.filter(work => work.category === category);

            // カード生成
            if (filteredWorks.length > 0) {
                grid.innerHTML = filteredWorks.map(work => createWorkCard(work)).join('');
                grid.style.display = 'grid';
                noResults.style.display = 'none';
            } else {
                grid.innerHTML = '';
                grid.style.display = 'none';
                noResults.style.display = 'block';
            }
        }

        /**
         * フィルタボタンの状態を更新する関数
         * @param {HTMLElement} activeButton - アクティブなボタン要素
         */
        function updateButtonState(activeButton) {
            // すべてのボタンのaria-pressedをfalseに
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.setAttribute('aria-pressed', 'false');
                btn.classList.remove('active');
            });
            
            // 選択したボタンのaria-pressedをtrueに
            activeButton.setAttribute('aria-pressed', 'true');
            activeButton.classList.add('active');
        }

        /**
         * 初期化関数
         */
        function init() {
            const filterButtons = document.querySelectorAll('.filter-btn');
            
            // 初期表示：すべての作品
            filterWorks('all');

            // クリックイベントの設定
            filterButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const category = this.dataset.category;
                    filterWorks(category);
                    updateButtonState(this);
                });

                // キーボードナビゲーション（Enter/Spaceで決定）
                btn.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            });
        }

        // DOM読み込み後に初期化
        document.addEventListener('DOMContentLoaded', init);
    </script>

    <style>
    /* フィルタボタンのスタイル */
    .filter-buttons {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-start;
    }

    .filter-btn {
        padding: 10px 20px;
        border: 1px solid #e5e5e5;
        background: #fff;
        color: #666;
        font-size: 0.875rem;
        font-family: 'Inter', sans-serif;
        cursor: pointer;
        transition: all 0.2s ease;
        border-radius: 2px;
    }

    .filter-btn:hover {
        border-color: #333;
        color: #333;
    }

    .filter-btn.active {
        background: #1a1a1a;
        border-color: #1a1a1a;
        color: #fff;
    }

    .filter-btn:focus {
        outline: 2px solid #1a1a1a;
        outline-offset: 2px;
    }

    /* グリッドレイアウト */
    .grid {
        display: grid;
    }

    .grid-cols-1 {
        grid-template-columns: repeat(1, minmax(0, 1fr));
    }

    @media (min-width: 768px) {
        .md\:grid-cols-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (min-width: 1024px) {
            .lg\:grid-cols-3 {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        .gap-8 {
            gap: 2rem;
        }

        /* 作品の inúmer */
        .work-item {
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .work-item[hidden] {
            display: none;
        }
    </style>
</body>
</html>
